@let ordersData = this.orderService.orders();
<app-header />
<p>orders-page works!</p>

<mat-table [dataSource]="ordersData">
  <ng-container matColumnDef="orderNumber">
    <mat-header-cell *matHeaderCellDef>Orden</mat-header-cell>
    <mat-cell *matCellDef="let row">{{ row.orderNumber }}</mat-cell>
  </ng-container>

  <ng-container matColumnDef="items">
    <mat-header-cell *matHeaderCellDef>Items</mat-header-cell>
    <mat-cell *matCellDef="let row">{{ row._count.items }}</mat-cell>
  </ng-container>

  <ng-container matColumnDef="total">
    <mat-header-cell *matHeaderCellDef>Total</mat-header-cell>
    <mat-cell *matCellDef="let row">{{ row.total | currency }}</mat-cell>
  </ng-container>

  <ng-container matColumnDef="status">
    <mat-header-cell *matHeaderCellDef>Status</mat-header-cell>
    <mat-cell *matCellDef="let row">
      <mat-chip [class]="row.status.toLowerCase()">
        {{ row.status }}
      </mat-chip>
    </mat-cell>
  </ng-container>

  <ng-container matColumnDef="createdAt">
    <mat-header-cell *matHeaderCellDef>Fecha</mat-header-cell>
    <mat-cell *matCellDef="let row">{{ row.createdAt | date: 'dd/MM/yyyy' }}</mat-cell>
  </ng-container>

  <mat-header-row *matHeaderRowDef="columns"></mat-header-row>
  <mat-row *matRowDef="let row; columns: columns"></mat-row>
</mat-table>
