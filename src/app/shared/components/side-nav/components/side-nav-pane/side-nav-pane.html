<mat-drawer-container class="sidenav-container">
  <!-- DRAWER (Lateral o Overlay según responsive) -->
  <mat-drawer
    #drawer
    [mode]="sideNavService.drawerMode()"
    [opened]="sideNavService.isMobile() ? sideNavService.isDrawerOpen() : true"
    [disableClose]="!sideNavService.isMobile()"
    class="sidenav-drawer"
    [class.minimized]="sideNavService.isMinimized() && !sideNavService.isMobile()"
  >
    <div class="drawer-content">
      <!-- Header: Logo / Título + Toggle Minimize -->
      <div class="drawer-header">
        @if (!sideNavService.isMinimized() || sideNavService.isMobile()) {
          <h3 class="drawer-title">POS System</h3>
        }
        @if (!sideNavService.isMobile()) {
          <button
            mat-icon-button
            (click)="onToggleMinimized()"
            class="toggle-minimize-btn"
            [attr.aria-label]="sideNavService.isMinimized() ? 'Expandir' : 'Minimizar'"
          >
            <mat-icon>
              {{ sideNavService.isMinimized() ? 'chevron_right' : 'chevron_left' }}
            </mat-icon>
          </button>
        }
      </div>

      <mat-divider></mat-divider>

      <!-- Menu Items -->
      <div class="drawer-menu">
        <app-side-nav-menu-items (itemSelected)="onMenuItemSelected()"></app-side-nav-menu-items>
      </div>

      <mat-divider></mat-divider>
    </div>
  </mat-drawer>

  <!-- Main Content Area -->
  <mat-drawer-content class="main-content">
    <!-- Hamburguesa (solo en móvil) -->
    @if (sideNavService.isMobile()) {
      <button
        mat-icon-button
        (click)="onToggleDrawer()"
        class="mobile-menu-btn"
        [attr.aria-label]="'Menú'"
      >
        <mat-icon>menu</mat-icon>
      </button>
    }

    <!-- Contenido de la aplicación -->
    <ng-content></ng-content>
  </mat-drawer-content>
</mat-drawer-container>
